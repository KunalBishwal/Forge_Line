version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: forgeline-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: forgeline
      POSTGRES_USER: forgeline
      POSTGRES_PASSWORD: forgeline_secret
    ports:
      - '5432:5432'
    volumes:
      - forgeline_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U forgeline -d forgeline']
      interval: 5s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: forgeline-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@forgeline.dev
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - '5050:80'
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  forgeline_pgdata:
    driver: local
